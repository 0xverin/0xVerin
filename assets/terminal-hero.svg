<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">0xverin remote AI and crypto research terminal</title>
  <desc id="desc">A neon terminal combining remote work status with an AI and crypto research system map.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2b36" />
      <stop offset="0.52" stop-color="#14233c" />
      <stop offset="1" stop-color="#123440" />
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#12313d" />
      <stop offset="0.55" stop-color="#18283d" />
      <stop offset="1" stop-color="#123440" />
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d9ff" />
      <stop offset="0.5" stop-color="#536a91" />
      <stop offset="1" stop-color="#ff3d9a" />
    </linearGradient>
    <path id="frame-orbit" d="M100 1 H1186 A13 13 0 0 1 1199 14 V506 A13 13 0 0 1 1186 519 H14 A13 13 0 0 1 1 506 V14 A13 13 0 0 1 14 1 H100 Z" />
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
