  <path d="M28 430 H250 L284 396 H430" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.32" />
  <path d="M956 52 H1110 L1140 82 V126" fill="none" stroke="#ff3d9a" stroke-width="1" opacity="0.3" />
  <rect x="1" y="1" width="1198" height="518" rx="13" fill="none" stroke="url(#frame)" stroke-opacity="0.62" stroke-width="2" />
  <rect x="1" y="1" width="1198" height="42" rx="13" fill="url(#chrome)" />
  <rect x="1" y="31" width="1198" height="12" fill="url(#chrome)" />
