    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 3.5 H4" stroke="#a9d9e3" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="14" fill="url(#background)" />
  <path d="M0 410 L310 74 H560 L160 520 H0 Z" fill="#00d9ff" opacity="0.035" />
