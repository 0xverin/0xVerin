<svg xmlns="http://www.w3.org/2000/svg" width="360" height="88" viewBox="0 0 360 88" role="img" aria-labelledby="title desc">
  <title id="title">Connect on Telegram</title>
  <desc id="desc">Cyber terminal button linking to 0xverin on Telegram.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2b36" />
      <stop offset="1" stop-color="#18243d" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 H0 V20" fill="none" stroke="#4a7180" stroke-width="1" opacity="0.28" />
    </pattern>
  </defs>
  <rect x="1" y="1" width="358" height="86" rx="7" fill="url(#background)" stroke="#38e5ff" stroke-width="1.5" />
  <rect x="1" y="1" width="358" height="86" rx="7" fill="url(#grid)" />
  <path d="M22 50 54 24 42 60 34 49 22 50Z M34 49 54 24" fill="none" stroke="#38e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="76" y="29" fill="#38e5ff" font-size="12">$ connect --channel</text>
    <text x="76" y="55" fill="#f4f7fb" font-size="20" font-weight="600">TELEGRAM</text>
    <text x="76" y="73" fill="#93adba" font-size="11">@CryptoVerin</text>
    <text x="336" y="55" text-anchor="end" fill="#47d16c" font-size="12">[OPEN]</text>
  </g>
</svg>
